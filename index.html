<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursed Alley: Bikini Bloodbath Bowling</title>
    <style>
        body { 
            margin: 0; overflow: hidden; 
            background-color: #151515; /* Deep Charcoal */
            background-image: url('https://www.transparenttextures.com/patterns/asfalt-dark.png'); /* Darker Grit */
            background-blend-mode: multiply;
            font-family: 'Courier New', Courier, monospace;
            image-rendering: pixelated;
        }
        /* Electrical Tape Corners */
        .tape {
            position: absolute; width: 120px; height: 40px;
            background: #080808; border: 1px solid #1a1a1a;
            z-index: 1500; pointer-events: none;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }
        .tape-tl { top: -10px; left: -30px; transform: rotate(-35deg); }
        .tape-tr { top: -10px; right: -30px; transform: rotate(35deg); }
        .tape-bl { bottom: -10px; left: -30px; transform: rotate(35deg); }
        .tape-br { bottom: -10px; right: -30px; transform: rotate(-35deg); }

        /* VHS Grain Overlay (Subtle but Gritty) */
        body::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.18; pointer-events: none; z-index: 2000;
        }
        #game-container { position: relative; width: 100vw; height: 100vh; background: transparent; }
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between; padding: 20px; box-sizing: border-box;
            filter: contrast(1.4) brightness(0.85);
        }
        .vhs-text {
            color: #fff; font-size: 2rem; font-weight: bold; text-transform: uppercase;
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #ff0000;
            animation: flicker 0.2s infinite; opacity: 0.8;
            margin-left: 40px; /* Shifted to avoid vignette */
        }
        .score-container { 
            position: absolute; top: 15px; right: 15px;
            display: flex; flex-direction: column; align-items: flex-end;
            pointer-events: none;
        }
        .score-sheet {
            display: grid;
            grid-template-columns: repeat(5, 90px);
            grid-template-rows: repeat(2, 90px);
            gap: 12px;
            border: 4px solid #000;
            padding: 12px;
            background: #dcdcdc; /* Dirtier Xerox color */
            box-shadow: 10px 10px 0 rgba(0,0,0,0.9), -2px -2px 0 #333;
            transform: rotate(1.5deg);
        }
        .frame {
            border: 3px solid #111;
            position: relative;
            background: #fff;
            box-shadow: inset 2px 2px 0 rgba(0,0,0,0.15);
        }
        .frame-header {
            position: absolute; top: 2px; left: 4px;
            font-size: 0.8rem; color: #000; font-weight: 900;
            z-index: 2;
        }
        .t1 {
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            font-size: 2.5rem; color: #000; font-weight: 900;
            padding-top: 10px; padding-right: 15px;
            box-sizing: border-box;
        }
        .t2, .t3 { 
            position: absolute; top: 0; right: 0;
            width: 34px; height: 34px;
            border-left: 3px solid #111; border-bottom: 3px solid #111;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.4rem; color: #ff0000; font-weight: 900;
            background: rgba(0,0,0,0.1);
            z-index: 1;
        }
        .t3 { right: 36px; border-right: 3px solid #111; }
        .total-score { 
            margin-top: 15px; font-size: 2.5rem; color: #fff; 
            background: #ff0000; padding: 5px 15px; font-weight: 900;
            box-shadow: 5px 5px 0 #000;
        }
        .instructions { 
            font-size: 1.1rem; color: #fff; text-align: left; margin-bottom: 25px; 
            text-transform: uppercase; letter-spacing: 1px;
            background: rgba(0,0,0,0.85); padding: 10px; width: fit-content;
            border-left: 5px solid #ff0000;
        }
        .overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-3deg);
            font-size: 5rem; color: #fff; display: none; text-align: center;
            border: 10px solid #fff; padding: 30px; background: #000;
            white-space: nowrap; z-index: 1000; font-weight: 900;
            box-shadow: 15px 15px 0 #ff0000;
            text-shadow: 4px 4px 0 #ff0000;
        }
        #vhs-tracking {
            position: absolute; top: 0; left: 0; width: 100%; height: 20px;
            background: rgba(255,255,255,0.1);
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
            pointer-events: none; opacity: 0;
            z-index: 500;
            animation: tracking-move 8s infinite linear;
        }
        @keyframes tracking-move {
            0% { top: -5%; opacity: 0; }
            10% { opacity: 0.2; }
            90% { opacity: 0.2; }
            100% { top: 105%; opacity: 0; }
        }
        @keyframes flicker {
            0% { opacity: 0.8; }
            5% { opacity: 0.4; }
            10% { opacity: 0.8; }
            15% { opacity: 1; }
            25% { opacity: 0.2; }
            30% { opacity: 1; }
            100% { opacity: 0.8; }
        }
    </style>
    
    <!-- Import Map for Three.js and Addons -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <!-- Ammo.js (Local build) -->
    <script src="./js/ammo.js"></script>
</head>
<body>
    <div class="tape tape-tl"></div>
    <div class="tape tape-tr"></div>
    <div class="tape tape-bl"></div>
    <div class="tape tape-br"></div>
    <div id="vhs-tracking"></div>
    <div id="game-container">
        <div id="ui-layer">
            <div class="vhs-text">CHANNEL 666: BLOOD BOWL</div>
            <div id="center-msg" class="vhs-text overlay">STRIKE!</div>

            <div class="score-container">
                <div class="score-sheet">
                    <div class="frame"><div class="frame-header">1</div><div class="t1" id="f1-t1"></div><div class="t2" id="f1-t2"></div><div class="score" id="f1-s"></div></div>
                    <div class="frame"><div class="frame-header">2</div><div class="t1" id="f2-t1"></div><div class="t2" id="f2-t2"></div><div class="score" id="f2-s"></div></div>
                    <div class="frame"><div class="frame-header">3</div><div class="t1" id="f3-t1"></div><div class="t2" id="f3-t2"></div><div class="score" id="f3-s"></div></div>
                    <div class="frame"><div class="frame-header">4</div><div class="t1" id="f4-t1"></div><div class="t2" id="f4-t2"></div><div class="score" id="f4-s"></div></div>
                    <div class="frame"><div class="frame-header">5</div><div class="t1" id="f5-t1"></div><div class="t2" id="f5-t2"></div><div class="score" id="f5-s"></div></div>
                    <div class="frame"><div class="frame-header">6</div><div class="t1" id="f6-t1"></div><div class="t2" id="f6-t2"></div><div class="score" id="f6-s"></div></div>
                    <div class="frame"><div class="frame-header">7</div><div class="t1" id="f7-t1"></div><div class="t2" id="f7-t2"></div><div class="score" id="f7-s"></div></div>
                    <div class="frame"><div class="frame-header">8</div><div class="t1" id="f8-t1"></div><div class="t2" id="f8-t2"></div><div class="score" id="f8-s"></div></div>
                    <div class="frame"><div class="frame-header">9</div><div class="t1" id="f9-t1"></div><div class="t2" id="f9-t2"></div><div class="score" id="f9-s"></div></div>
                    <div class="frame"><div class="frame-header">10</div><div class="t1" id="f10-t1"></div><div class="t2" id="f10-t2"></div><div class="score" id="f10-s"></div></div>
                </div>
                <div class="total-score">TOTAL: <span id="score">000000</span></div>
                <div class="vhs-text" style="font-size: 1rem; margin-top: 5px;">
                    DOWN: <span id="pins-down">0</span> | LEFT: <span id="pins-left">10</span>
                </div>
            </div>

            <div class="instructions">
                DRAG BACK & RELEASE TO KILL<br>
                [R] TO RESET RACK
                <div style="margin-top: 10px;">
                    MUSIC: <input type="range" id="volume" min="0" max="1" step="0.1" value="0.5" style="pointer-events: auto; vertical-align: middle;">
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="./js/main.js"></script>
</body>
</html>
